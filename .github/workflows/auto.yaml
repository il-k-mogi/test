name: Automatic Branch Merging

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  merge:
    name: Cascading Auto Merge
    runs-on: ubuntu-latest

    # bot のアクションにより処理が伝播することを防ぐために、bot 以外のマージで起動するようにする
    if: |
      github.event.pull_request.merged == true
      && startsWith(github.base_ref, 'release/v')
      && github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: GetToken
        id: token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}

      - name: Install package
        run: pnpm install --frozen-lockfile

      - name: Run cascade merge
        uses: actions/github-script@v8
        env:
          APP_TOKEN: ${{ steps.token.outputs.token }}
        with:
          script: |
            const { main } = await import('${{ github.workspace }}/.github/workflows/scripts/cascade.ts')

            await main({
              github,
              context,
              core,
              currentBranch: '${{ github.base_ref }}',
              originalPrNumber: ${{ github.event.pull_request.number }},
              token: process.env.APP_TOKEN
            })

